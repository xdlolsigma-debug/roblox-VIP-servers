<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Serwery Roblox</title>

<style>
body {
    background: #0f172a;
    color: white;
    font-family: Arial;
    padding: 20px;
}

.container {
    max-width: 700px;
    margin: auto;
}

.card {
    background: #1f2937;
    padding: 12px;
    margin-top: 10px;
    border-radius: 10px;
}

.hidden {
    display: none;
}

input, textarea {
    width: 100%;
    margin: 5px 0;
    padding: 10px;
}

/* 🔥 niewidzialny przycisk */
#secretBtn {
    position: fixed;
    bottom: 10px;
    right: 10px;
    width: 60px;
    height: 60px;
    opacity: 0;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="container">

<h1>🎮 Serwery Roblox</h1>

<input id="search" placeholder="🔍 Szukaj...">

<!-- 🔐 UKRYTY PANEL ADMINA -->
<div id="adminPanel" class="hidden">

    <input id="password" type="password" placeholder="Hasło">
    <button onclick="login()">Zaloguj</button>

    <div id="adminContent" class="hidden">
        <input id="name" placeholder="Nazwa">
        <input id="game" placeholder="Gra">
        <input id="link" placeholder="Link">
        <textarea id="desc" placeholder="Opis"></textarea>

        <!-- ❗ tylko admin -->
        <button onclick="addServer()">Dodaj serwer</button>
    </div>

</div>

<div id="list"></div>

</div>

<div id="secretBtn"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

// 🔑 FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyBsr99aUgM4rRinUEMPpP8ZR2VvdiQ9JFo",
  authDomain: "roblox-serverd.firebaseapp.com",
  projectId: "roblox-serverd",
  storageBucket: "roblox-serverd.firebasestorage.app",
  messagingSenderId: "742171650132",
  appId: "1:742171650132:web:d34bef0c89612ed6d3e5c1"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let isAdmin = false;

// 🔥 otwieranie panelu (tylko sekret)
document.getElementById("secretBtn").onclick = () => {
    document.getElementById("adminPanel").classList.toggle("hidden");
};

document.addEventListener("keydown", e => {
    if (e.key === "ArrowUp") {
        document.getElementById("adminPanel").classList.toggle("hidden");
    }
});

// ✅ login
window.login = function() {
    let pass = document.getElementById("password").value;

    if (pass === "admin123") {
        isAdmin = true;
        document.getElementById("adminContent").classList.remove("hidden");
    } else {
        alert("Złe hasło");
    }
};

// ✅ dodawanie (TYLKO ADMIN)
window.addServer = async function() {

    if (!isAdmin) {
        alert("Nie jesteś adminem!");
        return;
    }

    let name = document.getElementById("name").value;
    let game = document.getElementById("game").value;
    let link = document.getElementById("link").value;
    let desc = document.getElementById("desc").value;

    if (!name || !game || !link) {
        alert("Uzupełnij dane!");
        return;
    }

    await addDoc(collection(db, "servers"), {
        name,
        game,
        link,
        desc
    });

    alert("✅ Dodano serwer!");

    loadServers();
};

// ✅ usuwanie (TYLKO ADMIN)
window.deleteServer = async function(id) {

    if (!isAdmin) return;

    await deleteDoc(doc(db, "servers", id));
    loadServers();
};

// ✅ pobieranie
async function loadServers(filter = "") {

    let list = document.getElementById("list");
    list.innerHTML = "";

    const querySnapshot = await getDocs(collection(db, "servers"));

    querySnapshot.forEach((docSnap) => {

        let s = docSnap.data();

        if (
            !s.name.toLowerCase().includes(filter.toLowerCase()) &&
            !s.game.toLowerCase().includes(filter.toLowerCase())
        ) return;

        let div = document.createElement("div");
        div.className = "card";

        div.innerHTML =
            "<b>" + s.name + "</b> (" + s.game + ")<br>" +
            s.desc + "<br>" +
            "<a href='" + s.link + "' target='_blank'>Dołącz</a><br>" +
            (isAdmin ? "<button onclick='deleteServer(\"" + docSnap.id + "\")'>Usuń</button>" : "");

        list.appendChild(div);
    });
}

// ✅ search
document.getElementById("search").oninput = function() {
    loadServers(this.value);
};

// start
loadServers();

</script>

</body>
</html>
