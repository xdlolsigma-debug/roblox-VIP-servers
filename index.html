<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Serwery Roblox</title>

<style>
body {
    background: #0f172a;
    color: white;
    font-family: Arial;
    margin: 0;
    padding: 20px;
}

h1 {
    text-align: center;
}

/* kontener */
.container {
    max-width: 700px;
    margin: auto;
}

/* karta */
.card {
    background: #1f2937;
    padding: 12px;
    margin-top: 10px;
    border-radius: 10px;
    display: flex;
    gap: 10px;
    align-items: center;
    transition: 0.2s;
}

.card:hover {
    transform: scale(1.02);
}

/* miniaturka */
.thumb {
    width: 70px;
    height: 70px;
    object-fit: cover;
    border-radius: 8px;
}

/* tekst */
.info {
    flex: 1;
}
