<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Serwery Roblox</title>

<style>
body {
    background: #0f172a;
    color: white;
    font-family: Arial;
    padding: 20px;
}

.container {
    max-width: 700px;
    margin: auto;
}

h1 {
    text-align: center;
}

.card {
    background: #1f2937;
    padding: 12px;
    margin-top: 10px;
    border-radius: 10px;
}

input, textarea {
    width: 100%;
    margin: 5px 0;
    padding: 10px;
}

button {
    padding: 8px;
    margin-top: 5px;
}

.hidden {
    display: none;
}

.adminPanel {
    background: #111827;
    padding: 15px;
    margin-bottom: 15px;
}

#secretBtn {
    position: fixed;
    bottom: 5px;
    right: 5px;
    width: 40px;
    height: 40px;
    opacity: 0;
}
</style>

</head>
<body>

<div class="container">

<h1>🎮 Serwery Roblox</h1>

<input id="search" placeholder="🔍 Szukaj...">

<div id="adminPanel" class="adminPanel hidden">

    <div id="loginBox">
        <input id="password" type="password" placeholder="Hasło">
        <button onclick="login()">Zaloguj</button>
    </div>

    <div id="adminContent" class="hidden">
        <input id="name" placeholder="Nazwa">
        <input id="game" placeholder="Gra">
        <input id="link" placeholder="Link">
        <textarea id="desc" placeholder="Opis"></textarea>
        <button onclick="addServer()">Dodaj</button>
    </div>

</div>

<div id="list"></div>

</div>

<div id="secretBtn"></div>

<script type="module">

// 🔥 FIREBASE
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

// ✅ TWÓJ CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyBsr99aUgM4rRinUEMPpP8ZR2VvdiQ9JFo",
  authDomain: "roblox-serverd.firebaseapp.com",
  projectId: "roblox-serverd",
  storageBucket: "roblox-serverd.firebasestorage.app",
  messagingSenderId: "742171650132",
  appId: "1:742171650132:web:d34bef0c89612ed6d3e5c1",
  measurementId: "G-7BDJ25X93X"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let isAdmin = false;

// panel
document.getElementById("secretBtn").onclick = () => {
    document.getElementById("adminPanel").classList.toggle("hidden");
};

document.addEventListener("keydown", e => {
    if (e.key === "ArrowUp") {
        document.getElementById("adminPanel").classList.toggle("hidden");
    }
});

// login
function login() {
    let pass = document.getElementById("password").value;

    if (pass === "admin123") {
        isAdmin = true;
        document.getElementById("adminContent").classList.remove("hidden");
        document.getElementById("loginBox").classList.add("hidden");
    } else {
        alert("Złe hasło");
    }
}

// ➕ DODAWANIE DO FIREBASE
async function addServer() {
    if (!isAdmin) return;

    let name = document.getElementById("name").value;
    let game = document.getElementById("game").value;
    let link = document.getElementById("link").value;
    let desc = document.getElementById("desc").value;

    await addDoc(collection(db, "servers"), {
        name,
        game,
        link,
        desc
    });

    loadServers();
}

// ❌ USUWANIE
async function deleteServer(id) {
    await deleteDoc(doc(db, "servers", id));
    loadServers();
}

// 📦 POBIERANIE Z BAZY
async function loadServers(filter = "") {
    let list = document.getElementById("list");
    list.innerHTML = "";

    const querySnapshot = await getDocs(collection(db, "servers"));

    querySnapshot.forEach((docSnap) => {
        let s = docSnap.data();

        if (
            !s.name.toLowerCase().includes(filter.toLowerCase()) &&
            !s.game.toLowerCase().includes(filter.toLowerCase())
        ) return;

        let div = document.createElement("div");
        div.className = "card";

        div.innerHTML =
            "<b>" + s.name + "</b> (" + s.game + ")<br>" +
            s.desc + "<br>" +
            "<a href='" + s.link + "' target='_blank'>Dołącz</a><br>" +
            (isAdmin ? "<button onclick='deleteServer(\"" + docSnap.id + "\")'>Usuń</button>" : "");

        list.appendChild(div);
    });
}

// 🔍 SEARCH
document.getElementById("search").oninput = function () {
    loadServers(this.value);
};

// start
loadServers();

</script>

</body>
</html>
